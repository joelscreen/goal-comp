<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Panacea - Predict, Preserve, Provide</title>
        <link rel="stylesheet" href="{{url_for('static', filename='styles.css')}}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    </head>
    <body>
        <div class="container">
            <div class="sidebar">
                <p><strong>PANACEA</strong></p>
                <button onclick="window.location.href='/'"><i class="fa-solid fa-house"></i>&nbsp;HOME</button>
                <button onclick="window.location.href='/predict'"><i class="fa-solid fa-arrow-trend-up"></i>&nbsp;PREDICT</button>
                <button onclick="window.location.href='/preserve'"><i class="fa-solid fa-jar"></i>&nbsp;PRESERVE</button>
                <button onclick="window.location.href='/provide'"><i class="fa-solid fa-handshake"></i>&nbsp;PROVIDE</button>
                <button onclick="window.location.href='/recipes'"><i class="fa-solid fa-list"></i>&nbsp;RECIPES</button>
                <button onclick="window.location.href='/devices'"><i class="fa-solid fa-mobile"></i>&nbsp;DEVICES</button>
                <button onclick="window.location.href='/notifications'"><i class="fa-solid fa-bell"></i>&nbsp;NOTIFICATIONS</button>
            </div>
            <div class="navbar">
                <img src="{{url_for('static', filename='assets/logo.png')}}" alt="panacea logo" height="100" width="100">
            </div>
            <div class="content">
                <div class="desc-content">
                    <div class="non-img-desc">
                        <div class="desc">
                            <strong style="font-size: 50px;">Preserve</strong>
                            <p style="font-size: 30px;">Making Every Bite Count</p>
                        </div>
                        <br>
                        <div style="display: flex; flex-direction: row;">
                            <div class="save-food">
                                <span style="font-size: 32px;">Kitchen Inventory</span>
                                <table id="kitchen-inventory-table">
                                    <tr>
                                        <th>Sr. No.</th>
                                        <th>Food Name</th>
                                        <th>Days Till Expiry</th>
                                    </tr>
                                </table>
                            </div>
                            &emsp;
                            &emsp;
                            <div class="food-details">
                                <div class="img-food-details" style="width: 400px; height: 520px;">
                                    <img src="{{url_for('static', filename='assets/preserve-pic.jpeg')}}" alt="food image" width="400" height="520">
                                </div>
                            </div>
                        </div>
                        <br>
                        <div style="display: flex; flex-direction: row; position: absolute;">
                            <div class="recipe">
                                Recipes
                                <br>
                                <br>
                                <div class="options" id="expiring-recipes" style="display: flex; flex-direction: column;">
                                </div>
                            </div>
                            &emsp;
                            &emsp;
                            <div class="demand-factors">
                                <div style="font-size: 32px;">Use Soon</div>
                                <table id="use-soon">
                                    <tr>
                                        <th>Sr. No.</th>
                                        <th style="padding-right: 45px;">Item</th>
                                        <th>Days Till Expiry</th>
                                        <th>Expiry Risk Score</th>
                                    </tr>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="{{url_for('static', filename='scripts/preserve.js')}}"></script>
    </body>
</html>
