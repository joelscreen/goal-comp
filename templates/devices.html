<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Panacea - Predict, Preserve, Provide</title>
        <link rel="stylesheet" href="{{url_for('static', filename='styles.css')}}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    </head>
    <body>
        <div class="container">
            <div class="sidebar">
                <p><strong>PANACEA</strong></p>
                <button onclick="window.location.href='/'"><i class="fa-solid fa-house"></i>&nbsp;HOME</button>
                <button onclick="window.location.href='/predict'"><i class="fa-solid fa-arrow-trend-up"></i>&nbsp;PREDICT</button>
                <button onclick="window.location.href='/preserve'"><i class="fa-solid fa-jar"></i>&nbsp;PRESERVE</button>
                <button onclick="window.location.href='/provide'"><i class="fa-solid fa-handshake"></i>&nbsp;PROVIDE</button>
                <button onclick="window.location.href='/recipes'"><i class="fa-solid fa-list"></i>&nbsp;RECIPES</button>
                <button onclick="window.location.href='/devices'"><i class="fa-solid fa-mobile"></i>&nbsp;DEVICES</button>
                <button onclick="window.location.href='/notifications'"><i class="fa-solid fa-bell"></i>&nbsp;NOTIFICATIONS</button>
            </div>
            <div class="navbar">
                <img src="{{url_for('static', filename='assets/logo.png')}}" alt="panacea logo" height="100" width="100">
            </div>
            <div class="content">
                <div class="desc-content">
                    <div class="non-img-desc">
                        <div class="desc">
                            <strong style="font-size: 50px;">Devices</strong>
                            <p style="font-size: 30px;">Manage all your devices</p>
                        </div>
                        <br>
                        <div class="save-food">
                            Eco Bucket Table
                            <table id="eco-bucket-table">
                                <tr>
                                    <th>Food</th>
                                    <th>No. of times wasted</th>
                                    <th>Average Waste</th>
                                </tr>
                            </table>
                        </div>
                        <br>
                        <div class="recipe">
                            <span style="font-size: 32px;">Freshness Info</span>
                            <p style="font-size: 24px;">Temperature: <span style="color: #186918;" id="temperature-p"></span><span style="color: #186918;">&deg;c</span></p>
                            <p style="font-size: 24px;">Humidity: <span style="color: #186918;" id="humidity-p"></span><span style="color: #186918;">%</span></p>
                            <p style="font-size: 24px;">Freshness: <span style="color: #186918;" id="freshness-p"></span><span style="color: #186918;">%</span></p>
                        </div>
                    </div>
                    &emsp;
                    &emsp;
                    &emsp;
                    &emsp;
                    &emsp;
                    &emsp;
                    &emsp;
                    &emsp;
                    <div class="food-details">
                        <div class="img-food-details" style="width: 490px; height: 490px;">
                            <img src="{{url_for('static', filename='assets/earth-food-pic.jpeg')}}" alt="food image" width="490" height="490">
                        </div>
                    </div>
                </div>            
            </div>
        </div>
        <script src="{{url_for('static', filename='scripts/devices.js')}}"></script>
    </body>
</html>
